name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v* 标签时触发 (如 v1.0.0)
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: split_pdf_gui.exe
            asset_name: pdf-toolbox-windows-x64.exe
          - os: macos-latest
            artifact_name: split_pdf_gui
            asset_name: pdf-toolbox-macos-x64
          - os: ubuntu-latest
            artifact_name: split_pdf_gui
            asset_name: pdf-toolbox-linux-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconsole --onefile --name split_pdf_gui `
            --icon=icon.ico `
            --add-data "presentation/i18n/locales;presentation/i18n/locales" `
            --hidden-import=tkinter `
            --hidden-import=tkinterdnd2 `
            split_pdf_gui.py

      - name: Build with PyInstaller (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller --noconsole --onefile --name split_pdf_gui \
            --add-data "presentation/i18n/locales:presentation/i18n/locales" \
            --hidden-import=tkinter \
            --hidden-import=tkinterdnd2 \
            split_pdf_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/pdf-toolbox-*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
